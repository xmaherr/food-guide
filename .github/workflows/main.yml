name: Automated Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Create directory if not exists
            sudo mkdir -p /var/www/food-guide
            sudo chown -R $USER:$USER /var/www/food-guide

            # Clone or pull
            if [ ! -d "/var/www/food-guide/.git" ]; then
              git clone git@github.com:xmaherr/food-guide.git /var/www/food-guide
            else
              cd /var/www/food-guide
              git fetch origin
              git reset --hard origin/main
              git clean -fd
            fi

            cd /var/www/food-guide

            # Install dependencies
            composer install --no-dev --optimize-autoloader

            # Run migrations and seeders
            php artisan migrate --force
            php artisan db:seed --class=StatisticSeeder --force

            # Clear all caches
            php artisan optimize:clear

            # Generate Swagger docs
            php artisan l5-swagger:generate

            # Ensure framework directories exist
            mkdir -p /var/www/food-guide/storage/framework/{sessions,views,cache}

            # Fix permissions — nginx runs with php-fpm
            sudo chown -R nginx:nginx /var/www/food-guide/storage /var/www/food-guide/bootstrap/cache
            sudo chmod -R 775 /var/www/food-guide/storage /var/www/food-guide/bootstrap/cache

            # Fix SELinux contexts (AlmaLinux 9)
            sudo chcon -Rt httpd_sys_rw_content_t /var/www/food-guide/storage 2>/dev/null || true
            sudo chcon -Rt httpd_sys_rw_content_t /var/www/food-guide/bootstrap/cache 2>/dev/null || true

            # Restart queue workers
            php artisan queue:restart